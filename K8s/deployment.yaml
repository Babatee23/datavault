apiVersion: apps/v1
kind: Deployment

metadata:
  name: datavault-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: datavault-api

  template:
    metadata:
      labels:
        app: datavault-api

    spec:
      containers:
      - name: datavault-api

        image: 867344444463.dkr.ecr.us-east-1.amazonaws.com/k3s-platform-repo:v1

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: datavault-config

        - secretRef:
            name: datavault-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 8000

          initialDelaySeconds: 15
          periodSeconds: 10