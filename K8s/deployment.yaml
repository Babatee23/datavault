apiVersion: apps/v1
kind: Deployment
metadata:
  name: datavault-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: datavault-api

  template:
    metadata:
      labels:
        app: datavault-api

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: datavault-api
        image: 867344444463.dkr.ecr.us-east-1.amazonaws.com/k3s-platform-repo:v1

        ports:
        - containerPort: 8080

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
